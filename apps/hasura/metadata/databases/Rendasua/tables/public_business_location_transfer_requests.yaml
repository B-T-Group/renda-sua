table:
  name: business_location_transfer_requests
  schema: public
object_relationships:
  - name: business_location
    using:
      foreign_key_constraint_on: business_location_id
  - name: from_business
    using:
      foreign_key_constraint_on: from_business_id
  - name: to_business
    using:
      foreign_key_constraint_on: to_business_id
  - name: from_user
    using:
      foreign_key_constraint_on: from_user_id
  - name: to_user
    using:
      foreign_key_constraint_on: to_user_id
  - name: requested_by_user
    using:
      foreign_key_constraint_on: requested_by_user_id
