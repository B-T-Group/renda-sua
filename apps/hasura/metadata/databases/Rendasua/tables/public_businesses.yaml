table:
  name: businesses
  schema: public
object_relationships:
  - name: referring_agent
    using:
      foreign_key_constraint_on: referred_by_agent_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
array_relationships:
  - name: business_addresses
    using:
      manual_configuration:
        column_mapping:
          id: business_id
        insertion_order: null
        remote_table:
          name: business_addresses
          schema: public
  - name: business_locations
    using:
      manual_configuration:
        column_mapping:
          id: business_id
        insertion_order: null
        remote_table:
          name: business_locations
          schema: public
  - name: items
    using:
      manual_configuration:
        column_mapping:
          id: business_id
        insertion_order: null
        remote_table:
          name: items
          schema: public
  - name: orders
    using:
      manual_configuration:
        column_mapping:
          id: business_id
        insertion_order: null
        remote_table:
          name: orders
          schema: public
  - name: rental_bookings
    using:
      manual_configuration:
        column_mapping:
          id: business_id
        insertion_order: null
        remote_table:
          name: rental_bookings
          schema: public
  - name: rental_items
    using:
      manual_configuration:
        column_mapping:
          id: business_id
        insertion_order: null
        remote_table:
          name: rental_items
          schema: public
  - name: rental_item_images
    using:
      manual_configuration:
        column_mapping:
          id: business_id
        insertion_order: null
        remote_table:
          name: rental_item_images
          schema: public
  - name: merchant_agreement_acceptances
    using:
      foreign_key_constraint_on:
        column: business_id
        table:
          name: business_merchant_agreement_acceptances
          schema: public
  - name: business_contracts
    using:
      foreign_key_constraint_on:
        column: business_id
        table:
          name: business_contracts
          schema: public
  - name: payment_accounts
    using:
      foreign_key_constraint_on:
        column: business_id
        table:
          name: business_payment_accounts
          schema: public
  - name: lifecycle_status_history
    using:
      foreign_key_constraint_on:
        column: business_id
        table:
          name: business_lifecycle_status_history
          schema: public
  - name: ai_token_usage
    using:
      foreign_key_constraint_on:
        column: business_id
        table:
          name: business_ai_token_usage
          schema: public
insert_permissions:
  - role: agent
    permission:
      check: {}
      columns:
        - id
        - user_id
        - name
        - main_interest
        - created_at
        - updated_at
        - is_admin
  - role: business
    permission:
      check:
        user:
          id:
            _eq: X-Hasura-User-Id
      columns:
        - user_id
        - name
        - main_interest
        - is_admin
  - role: client
    permission:
      check: {}
      columns:
        - id
        - user_id
        - name
        - main_interest
        - created_at
        - updated_at
        - is_admin
  - role: user
    permission:
      check: {}
      columns:
        - id
        - user_id
        - name
        - main_interest
        - created_at
        - updated_at
        - is_admin
select_permissions:
  - role: agent
    permission:
      columns:
        - id
        - user_id
        - name
        - main_interest
        - created_at
        - updated_at
        - is_admin
        - is_verified
        - lifecycle_status
        - is_storefront_visible
        - can_accept_orders
        - ai_tokens
      filter: {}
  - role: anonymous
    permission:
      columns:
        - id
        - name
        - created_at
        - updated_at
        - is_admin
        - is_verified
        - lifecycle_status
        - is_storefront_visible
        - can_accept_orders
        - merchant_agreement_version
        - merchant_agreement_accepted_at
      filter: {}
  - role: business
    permission:
      columns:
        - id
        - user_id
        - name
        - main_interest
        - created_at
        - updated_at
        - is_admin
        - is_verified
        - lifecycle_status
        - is_storefront_visible
        - can_accept_orders
        - ai_tokens
        - merchant_agreement_version
        - merchant_agreement_accepted_at
        - referred_by_agent_id
        - referral_code_used
      filter:
        user:
          id:
            _eq: X-Hasura-User-Id
  - role: client
    permission:
      columns:
        - id
        - user_id
        - name
        - main_interest
        - created_at
        - updated_at
        - is_admin
        - is_verified
        - lifecycle_status
        - is_storefront_visible
        - can_accept_orders
      filter: {}
update_permissions:
  - role: business
    permission:
      columns:
        - name
        - updated_at
        - is_admin
      filter:
        user:
          id:
            _eq: X-Hasura-User-Id
      check: null
