table:
  name: ai_image_cleanup_results
  schema: public
object_relationships:
  - name: business_image
    using:
      foreign_key_constraint_on: business_image_id
  - name: item_variant_image
    using:
      foreign_key_constraint_on: item_variant_image_id
  - name: job
    using:
      foreign_key_constraint_on: job_id
  - name: retry_of_result
    using:
      foreign_key_constraint_on: retry_of_result_id
select_permissions:
  - role: business
    permission:
      columns:
        - id
        - job_id
        - business_image_id
        - item_variant_image_id
        - original_image_url
        - original_s3_key
        - cleaned_image_url
        - cleaned_s3_key
        - status
        - error_message
        - retry_of_result_id
        - created_at
        - updated_at
        - completed_at
      filter:
        job:
          business:
            user:
              id:
                _eq: X-Hasura-User-Id
