table:
  name: item_ai_proposed_images
  schema: public
object_relationships:
  - name: review
    using:
      foreign_key_constraint_on: review_id
  - name: source_image
    using:
      foreign_key_constraint_on: source_image_id
select_permissions:
  - role: business
    permission:
      columns:
        - id
        - review_id
        - source_image_id
        - image_url
        - s3_key
        - display_order
        - created_at
      filter:
        review:
          item:
            business:
              user:
                id:
                  _eq: X-Hasura-User-Id
