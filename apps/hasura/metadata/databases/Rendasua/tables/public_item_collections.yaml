table:
  name: item_collections
  schema: public
object_relationships:
  - name: item
    using:
      foreign_key_constraint_on: item_id
  - name: collection
    using:
      foreign_key_constraint_on: collection_id
insert_permissions:
  - role: business
    permission:
      check:
        item:
          business:
            user:
              id:
                _eq: X-Hasura-User-Id
      columns:
        - item_id
        - collection_id
delete_permissions:
  - role: business
    permission:
      filter:
        item:
          business:
            user:
              id:
                _eq: X-Hasura-User-Id
select_permissions:
  - role: agent
    permission:
      columns:
        - item_id
        - collection_id
        - created_at
      filter: {}
  - role: anonymous
    permission:
      columns:
        - item_id
        - collection_id
        - created_at
      filter: {}
  - role: business
    permission:
      columns:
        - item_id
        - collection_id
        - created_at
      filter: {}
  - role: client
    permission:
      columns:
        - item_id
        - collection_id
        - created_at
      filter: {}
  - role: user
    permission:
      columns:
        - item_id
        - collection_id
        - created_at
      filter: {}
