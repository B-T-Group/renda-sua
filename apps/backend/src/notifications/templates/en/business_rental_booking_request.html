<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>New rental booking request</title>
  </head>
  <body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <h1>New rental booking request</h1>
    <p>
      <strong>{{{clientName}}}</strong> requested a booking for
      <strong>{{{rentalItemName}}}</strong>
      <span> at <strong>{{{locationName}}}</strong>.</span>
    </p>
    <p>
      Requested period:<br />
      <strong>{{{requestedStartAt}}}</strong> — <strong>{{{requestedEndAt}}}</strong>
    </p>
    <p>Request ID: {{{requestId}}}</p>
    <p>Listing ID: {{{listingId}}}</p>
    <p>Respond from your business dashboard in Rendasua.</p>
  </body>
</html>
