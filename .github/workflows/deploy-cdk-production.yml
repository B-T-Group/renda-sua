name: Deploy CDK Infrastructure to Production

on:
  push:
    branches: [prod]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

env:
  AWS_REGION: ca-central-1
  HASURA_ENDPOINT: https://hasura.rendasua.com
  HASURA_ADMIN_SECRET_ARN: arn:aws:secretsmanager:ca-central-1:235680477887:secret:hasura-prod-admin-H1onlM

permissions:
  id-token: write
  contents: read

jobs:
  deploy-cdk-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap CDK (if needed)
        run: |
          cd apps/cdk
          cdk bootstrap --require-approval never || echo "CDK already bootstrapped"

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Build core-packages layer
        run: |
          cd apps/cdk/src/lambda-layer
          bash build-core-packages-layer.sh

      - name: Build Lambda layer
        run: |
          cd apps/cdk/src/lambda-layer
          python3 build.py

      - name: Build CDK app
        run: |
          cd apps/cdk
          npm run build

      - name: Install Hasura CLI
        run: |
          curl -L https://github.com/hasura/graphql-engine/raw/stable/cli/get.sh | bash
          hasura version

      - name: Show deployment plan
        run: |
          cd apps/cdk
          cdk diff RendasuaInfrastructure-production HasuraEc2InfrastructureProd --context environment=production --context hasuraEnvironment=prod

      - name: Deploy CDK infrastructure to production
        run: |
          cd apps/cdk
          cdk deploy RendasuaInfrastructure-production HasuraEc2InfrastructureProd --context environment=production --context hasuraEnvironment=prod --require-approval never
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Apply Hasura migrations and metadata (prod)
        run: |
          cd apps/hasura
          HASURA_GRAPHQL_ADMIN_SECRET="$(aws secretsmanager get-secret-value --region "${{ env.AWS_REGION }}" --secret-id "${{ env.HASURA_ADMIN_SECRET_ARN }}" --query SecretString --output text)"
          HASURA_DB_NAME="Rendasua"
          hasura migrate apply --database-name "${HASURA_DB_NAME}" --endpoint "${{ env.HASURA_ENDPOINT }}" --admin-secret "${HASURA_GRAPHQL_ADMIN_SECRET}" --project .
          hasura metadata apply --endpoint "${{ env.HASURA_ENDPOINT }}" --admin-secret "${HASURA_GRAPHQL_ADMIN_SECRET}" --project .
          hasura metadata reload --endpoint "${{ env.HASURA_ENDPOINT }}" --admin-secret "${HASURA_GRAPHQL_ADMIN_SECRET}" --project .
          hasura metadata inconsistency status --endpoint "${{ env.HASURA_ENDPOINT }}" --admin-secret "${HASURA_GRAPHQL_ADMIN_SECRET}" --project .

      - name: Verify production deployment
        run: |
          echo "CDK production deployment completed successfully!"
          echo "Environment: production"
          echo "Region: ${{ env.AWS_REGION }}"
          echo "Deployed resources:"
          cd apps/cdk
          cdk list --context environment=production
