table:
  name: rental_listing_ai_reviews
  schema: public
object_relationships:
  - name: admin_feedback_by_user
    using:
      foreign_key_constraint_on: admin_feedback_by_user_id
  - name: listing
    using:
      foreign_key_constraint_on: listing_id
array_relationships:
  - name: proposed_images
    using:
      foreign_key_constraint_on:
        column: review_id
        table:
          name: rental_listing_ai_proposed_images
          schema: public
select_permissions:
  - role: business
    permission:
      columns:
        - id
        - listing_id
        - status
        - decision_reason
        - alignment_score
        - rubric
        - proposed_title
        - proposed_description
        - rejection_fields
        - prompt_version
        - created_at
        - completed_at
      filter:
        listing:
          rental_item:
            business:
              user:
                id:
                  _eq: X-Hasura-User-Id
