table:
  name: order_refund_requests
  schema: public
object_relationships:
  - name: business
    using:
      foreign_key_constraint_on: business_id
  - name: client
    using:
      foreign_key_constraint_on: client_id
  - name: order
    using:
      foreign_key_constraint_on: order_id
  - name: order_return
    using:
      foreign_key_constraint_on:
        column: refund_request_id
        table:
          name: order_returns
          schema: public
  - name: resolved_by_user
    using:
      foreign_key_constraint_on: resolved_by_user_id
array_relationships:
  - name: order_refund_events
    using:
      foreign_key_constraint_on:
        column: refund_request_id
        table:
          name: order_refund_events
          schema: public
  - name: order_refund_evidence
    using:
      foreign_key_constraint_on:
        column: refund_request_id
        table:
          name: order_refund_evidence
          schema: public
  - name: order_refund_payments
    using:
      foreign_key_constraint_on:
        column: refund_request_id
        table:
          name: order_refund_payments
          schema: public
select_permissions:
  - role: business
    permission:
      columns:
        - id
        - order_id
        - client_id
        - business_id
        - reason
        - client_notes
        - status
        - business_note
        - rejection_reason
        - refund_item_amount
        - refund_delivery_fee
        - inspection_acknowledged_at
        - created_at
        - updated_at
        - resolved_at
        - destination
        - payment_source_snapshot
        - approved_amount
        - requested_amount
        - currency
        - resolution_type
        - return_required
        - return_status
        - info_request_message
        - reopen_count
        - sla_due_at
      filter:
        business:
          user:
            id:
              _eq: X-Hasura-User-Id
      allow_aggregations: true
  - role: client
    permission:
      columns:
        - id
        - order_id
        - client_id
        - business_id
        - reason
        - client_notes
        - status
        - business_note
        - rejection_reason
        - refund_item_amount
        - refund_delivery_fee
        - inspection_acknowledged_at
        - created_at
        - updated_at
        - resolved_at
        - destination
        - payment_source_snapshot
        - approved_amount
        - requested_amount
        - currency
        - resolution_type
        - return_required
        - return_status
        - info_request_message
        - reopen_count
        - sla_due_at
      filter:
        client:
          user:
            id:
              _eq: X-Hasura-User-Id
