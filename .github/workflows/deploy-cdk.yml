name: Deploy CDK Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "apps/cdk/**"
      - "package.json"
      - "nx.json"
      - "tsconfig.base.json"
      - ".github/workflows/deploy-cdk.yml"

  workflow_dispatch:

env:
  AWS_REGION: ca-central-1
  CDK_ENVIRONMENT: development
  HASURA_ENDPOINT: https://hasura-dev.rendasua.com
  HASURA_ADMIN_SECRET_ARN: arn:aws:secretsmanager:ca-central-1:235680477887:secret:hasura-dev-admin-lvXQN9

permissions:
  id-token: write
  contents: read

jobs:
  deploy-cdk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap CDK (if needed)
        run: |
          cd apps/cdk
          cdk bootstrap --require-approval never || echo "CDK already bootstrapped"

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Build core-packages layer
        run: |
          cd apps/cdk/src/lambda-layer
          bash build-core-packages-layer.sh

      - name: Build Lambda layer
        run: |
          cd apps/cdk/src/lambda-layer
          python3 build.py

      - name: Build CDK app
        run: |
          cd apps/cdk
          npm run build

      - name: Install Hasura CLI
        run: |
          curl -L https://github.com/hasura/graphql-engine/raw/stable/cli/get.sh | bash
          hasura version

      - name: Synthesize CDK template
        run: |
          cd apps/cdk
          cdk synth RendasuaInfrastructure-${{ env.CDK_ENVIRONMENT }} HasuraEc2InfrastructureDev --context environment=${{ env.CDK_ENVIRONMENT }} --context hasuraEnvironment=dev

      - name: Deploy CDK infrastructure
        run: |
          cd apps/cdk
          cdk deploy RendasuaInfrastructure-${{ env.CDK_ENVIRONMENT }} HasuraEc2InfrastructureDev --context environment=${{ env.CDK_ENVIRONMENT }} --context hasuraEnvironment=dev --require-approval never
        env:
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Apply Hasura migrations and metadata (dev)
        run: |
          cd apps/hasura
          HASURA_GRAPHQL_ADMIN_SECRET="$(aws secretsmanager get-secret-value --region "${{ env.AWS_REGION }}" --secret-id "${{ env.HASURA_ADMIN_SECRET_ARN }}" --query SecretString --output text)"
          HASURA_DB_NAME="Rendasua"
          SOURCE_NAMES="$(curl -ks "${{ env.HASURA_ENDPOINT }}/v1/metadata" -H "x-hasura-admin-secret: ${HASURA_GRAPHQL_ADMIN_SECRET}" -H "content-type: application/json" -d '{"type":"export_metadata","args":{}}' | jq -r '.sources[].name')"
          if ! echo "${SOURCE_NAMES}" | rg -q '^Rendasua$'; then
            HASURA_DB_NAME="default"
            mkdir -p migrations/default
            rsync -a migrations/Rendasua/ migrations/default/
          fi
          hasura migrate apply --database-name "${HASURA_DB_NAME}" --endpoint "${{ env.HASURA_ENDPOINT }}" --admin-secret "${HASURA_GRAPHQL_ADMIN_SECRET}" --project .
          hasura metadata apply --endpoint "${{ env.HASURA_ENDPOINT }}" --admin-secret "${HASURA_GRAPHQL_ADMIN_SECRET}" --project .
          hasura metadata reload --endpoint "${{ env.HASURA_ENDPOINT }}" --admin-secret "${HASURA_GRAPHQL_ADMIN_SECRET}" --project .
          hasura metadata inconsistency status --endpoint "${{ env.HASURA_ENDPOINT }}" --admin-secret "${HASURA_GRAPHQL_ADMIN_SECRET}" --project .

      - name: Verify deployment
        run: |
          echo "CDK deployment completed successfully!"
          echo "Environment: ${{ env.CDK_ENVIRONMENT }}"
          echo "Region: ${{ env.AWS_REGION }}"
          echo "Deployed resources:"
          cd apps/cdk
          cdk list --context environment=${{ env.CDK_ENVIRONMENT }}
