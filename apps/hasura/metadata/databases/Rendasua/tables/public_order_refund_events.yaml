table:
  name: order_refund_events
  schema: public
object_relationships:
  - name: actor_user
    using:
      foreign_key_constraint_on: actor_user_id
  - name: refund_request
    using:
      foreign_key_constraint_on: refund_request_id
select_permissions:
  - role: business
    permission:
      columns:
        - id
        - refund_request_id
        - event_type
        - actor_type
        - actor_user_id
        - payload
        - created_at
      filter:
        refund_request:
          business:
            user:
              id:
                _eq: X-Hasura-User-Id
  - role: client
    permission:
      columns:
        - id
        - refund_request_id
        - event_type
        - actor_type
        - actor_user_id
        - payload
        - created_at
      filter:
        refund_request:
          client:
            user:
              id:
                _eq: X-Hasura-User-Id
