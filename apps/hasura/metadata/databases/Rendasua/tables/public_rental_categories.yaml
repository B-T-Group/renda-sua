table:
  name: rental_categories
  schema: public
array_relationships:
  - name: rental_item_images
    using:
      foreign_key_constraint_on:
        column: rental_category_id
        table:
          name: rental_item_images
          schema: public
  - name: rental_items
    using:
      foreign_key_constraint_on:
        column: rental_category_id
        table:
          name: rental_items
          schema: public
select_permissions:
  - role: anonymous
    permission:
      columns:
        - id
        - name
        - slug
        - display_order
        - is_active
        - created_at
        - updated_at
      filter:
        is_active:
          _eq: true
  - role: business
    permission:
      columns:
        - id
        - name
        - slug
        - display_order
        - is_active
        - created_at
        - updated_at
      filter: {}
  - role: client
    permission:
      columns:
        - id
        - name
        - slug
        - display_order
        - is_active
        - created_at
        - updated_at
      filter:
        is_active:
          _eq: true
