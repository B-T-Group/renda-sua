table:
  name: agent_referrals
  schema: public
object_relationships:
  - name: referring_agent
    using:
      foreign_key_constraint_on: referring_agent_id
  - name: referred_agent
    using:
      foreign_key_constraint_on: referred_agent_id
select_permissions:
  - role: admin
    permission:
      columns:
        - id
        - referring_agent_id
        - referred_agent_id
        - referral_code_used
        - commission_amount
        - created_at
        - updated_at
      filter: {}
