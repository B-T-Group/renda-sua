table:
  name: order_returns
  schema: public
object_relationships:
  - name: refund_request
    using:
      foreign_key_constraint_on: refund_request_id
select_permissions:
  - role: business
    permission:
      columns:
        - id
        - refund_request_id
        - status
        - instructions
        - received_at
        - inspected_at
        - inspection_notes
        - created_at
        - updated_at
      filter:
        refund_request:
          business:
            user:
              id:
                _eq: X-Hasura-User-Id
  - role: client
    permission:
      columns:
        - id
        - refund_request_id
        - status
        - instructions
        - received_at
        - inspected_at
        - inspection_notes
        - created_at
        - updated_at
      filter:
        refund_request:
          client:
            user:
              id:
                _eq: X-Hasura-User-Id
