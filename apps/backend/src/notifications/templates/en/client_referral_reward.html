<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your referral reward is here - Rendasua</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        color: #333;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
      }
      .header {
        background: #2c3e50;
        color: white;
        padding: 20px;
        text-align: center;
        border-radius: 8px 8px 0 0;
      }
      .content {
        background: #f8f9fa;
        padding: 30px;
        border-radius: 0 0 8px 8px;
      }
      .card {
        background: white;
        padding: 20px;
        border-radius: 8px;
        margin: 20px 0;
      }
      .code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        font-size: 18px;
        letter-spacing: 2px;
        padding: 14px 16px;
        background: #f1f3f5;
        border: 1px dashed #adb5bd;
        border-radius: 8px;
        text-align: center;
      }
      .small {
        color: #666;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Referral reward unlocked</h1>
      <p>Thanks for sharing Rendasua</p>
    </div>
    <div class="content">
      <h2>Hello {{{recipientName}}},</h2>
      <p>
        Great news — your referral code was used. Here’s your
        <strong>{{{ownRewardPct}}}%</strong> discount code for your next
        purchase:
      </p>
      <div class="card">
        <div class="code">{{{discountCode}}}</div>
        <p class="small">This code can only be used once.</p>
      </div>
      <p class="small">— The Rendasua team</p>
    </div>
  </body>
</html>
