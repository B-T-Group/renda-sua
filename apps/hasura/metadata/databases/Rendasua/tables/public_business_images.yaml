table:
  name: business_images
  schema: public
object_relationships:
  - name: business
    using:
      foreign_key_constraint_on: business_id
  - name: sub_category
    using:
      foreign_key_constraint_on: sub_category_id
insert_permissions:
  - role: business
    permission:
      check:
        business:
          user:
            identifier:
              _eq: X-Hasura-User-Id
      columns:
        - business_id
        - sub_category_id
        - image_url
        - s3_key
        - file_size
        - width
        - height
        - format
        - caption
        - alt_text
        - tags
        - status
select_permissions:
  - role: business
    permission:
      columns:
        - id
        - business_id
        - sub_category_id
        - image_url
        - s3_key
        - file_size
        - width
        - height
        - format
        - caption
        - alt_text
        - tags
        - status
        - created_at
      filter:
        business:
          user:
            identifier:
              _eq: X-Hasura-User-Id
update_permissions:
  - role: business
    permission:
      columns:
        - sub_category_id
        - image_url
        - s3_key
        - file_size
        - width
        - height
        - format
        - caption
        - alt_text
        - tags
        - status
      filter:
        business:
          user:
            identifier:
              _eq: X-Hasura-User-Id
      check: null
delete_permissions:
  - role: business
    permission:
      filter:
        business:
          user:
            identifier:
              _eq: X-Hasura-User-Id

