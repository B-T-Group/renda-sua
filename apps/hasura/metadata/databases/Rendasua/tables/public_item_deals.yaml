table:
  name: item_deals
  schema: public
object_relationships:
  - name: business_inventory
    using:
      foreign_key_constraint_on: inventory_item_id
select_permissions:
  - role: business
    permission:
      columns:
        - id
        - inventory_item_id
        - discount_type
        - discount_value
        - start_at
        - end_at
        - is_active
        - created_at
        - updated_at
      filter:
        business_inventory:
          business_location:
            business:
              user:
                id:
                  _eq: X-Hasura-User-Id
