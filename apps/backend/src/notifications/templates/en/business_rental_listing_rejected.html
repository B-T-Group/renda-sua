<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Your rental listing needs changes</title>
  </head>
  <body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <h1>Your rental listing was not approved</h1>
    <p>
      We reviewed your listing for <strong>{{{rentalItemName}}}</strong> (ID: {{{listingId}}}) and could not approve it yet.
    </p>
    <p><strong>Reason:</strong></p>
    <p style="white-space: pre-wrap;">{{{rejectionReason}}}</p>
    <p>
      You can update the listing and resubmit it for review. You will also find this message in your Rendasua inbox.
    </p>
  </body>
</html>
