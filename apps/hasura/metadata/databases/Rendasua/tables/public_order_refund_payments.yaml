table:
  name: order_refund_payments
  schema: public
object_relationships:
  - name: order
    using:
      foreign_key_constraint_on: order_id
  - name: refund_request
    using:
      foreign_key_constraint_on: refund_request_id
  - name: stripe_refund
    using:
      foreign_key_constraint_on: stripe_refund_id
select_permissions:
  - role: business
    permission:
      columns:
        - id
        - refund_request_id
        - order_id
        - destination
        - amount
        - currency
        - status
        - provider_ref
        - failure_reason
        - attempt
        - stripe_refund_id
        - created_at
        - updated_at
      filter:
        refund_request:
          business:
            user:
              id:
                _eq: X-Hasura-User-Id
  - role: client
    permission:
      columns:
        - id
        - refund_request_id
        - order_id
        - destination
        - amount
        - currency
        - status
        - provider_ref
        - failure_reason
        - attempt
        - stripe_refund_id
        - created_at
        - updated_at
      filter:
        refund_request:
          client:
            user:
              id:
                _eq: X-Hasura-User-Id
