table:
  name: stripe_connect_accounts
  schema: public
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
select_permissions:
  - role: agent
    permission:
      columns:
        - id
        - user_id
        - stripe_account_id
        - account_type
        - country
        - default_currency
        - charges_enabled
        - payouts_enabled
        - details_submitted
        - disabled_reason
        - status
        - created_at
        - updated_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
  - role: business
    permission:
      columns:
        - id
        - user_id
        - stripe_account_id
        - account_type
        - country
        - default_currency
        - charges_enabled
        - payouts_enabled
        - details_submitted
        - disabled_reason
        - status
        - created_at
        - updated_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
  - role: user
    permission:
      columns:
        - id
        - user_id
        - stripe_account_id
        - account_type
        - country
        - default_currency
        - charges_enabled
        - payouts_enabled
        - details_submitted
        - disabled_reason
        - status
        - created_at
        - updated_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
