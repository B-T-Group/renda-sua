table:
  name: order_refund_evidence
  schema: public
object_relationships:
  - name: refund_request
    using:
      foreign_key_constraint_on: refund_request_id
  - name: uploaded_by_user
    using:
      foreign_key_constraint_on: uploaded_by_user_id
select_permissions:
  - role: business
    permission:
      columns:
        - id
        - refund_request_id
        - file_url
        - mime_type
        - uploaded_by_user_id
        - created_at
      filter:
        refund_request:
          business:
            user:
              id:
                _eq: X-Hasura-User-Id
  - role: client
    permission:
      columns:
        - id
        - refund_request_id
        - file_url
        - mime_type
        - uploaded_by_user_id
        - created_at
      filter:
        refund_request:
          client:
            user:
              id:
                _eq: X-Hasura-User-Id
