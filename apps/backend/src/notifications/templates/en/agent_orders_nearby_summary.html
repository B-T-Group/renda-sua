<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orders near you — Rendasua</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        color: #333;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
      }
      .header {
        background: #3498db;
        color: white;
        padding: 20px;
        text-align: center;
        border-radius: 8px 8px 0 0;
      }
      .content {
        background: #f8f9fa;
        padding: 30px;
        border-radius: 0 0 8px 8px;
      }
      .footer {
        text-align: center;
        margin-top: 30px;
        color: #666;
        font-size: 0.9em;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>📍 Orders near you</h1>
      <p>Rendasua</p>
    </div>
    <div class="content">
      <h2>Hello {{{recipientName}}},</h2>
      <p>{{{message}}}</p>
      <p>Best regards,<br />The Rendasua Team</p>
    </div>
    <div class="footer">
      <p>&copy; {{{currentYear}}} Rendasua. All rights reserved.</p>
      <p>This is an automated message. Please do not reply to this email.</p>
    </div>
  </body>
</html>
